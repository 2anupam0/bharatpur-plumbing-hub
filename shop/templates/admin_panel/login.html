{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | {{ site_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .login-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        .login-input:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
        }
        .login-btn {
            background: linear-gradient(135deg, #16a34a, #15803d);
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #15803d, #166534);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22,163,74,0.3);
        }
    </style>
</head>
<body class="login-bg">
    <div class="flex items-center justify-center min-h-screen p-4 relative overflow-hidden">
        <div class="floating-shape w-72 h-72 bg-green-500 top-20 -left-20" style="animation-delay: 0s;"></div>
        <div class="floating-shape w-96 h-96 bg-emerald-500 bottom-20 -right-20" style="animation-delay: 2s;"></div>
        <div class="floating-shape w-48 h-48 bg-teal-500 top-1/2 left-1/4" style="animation-delay: 4s;"></div>

        <div class="login-card rounded-2xl shadow-2xl p-8 w-full max-w-md relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-brand-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-shield-halved text-brand-600 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">ARUN Suppliers</h1>
                <p class="text-sm text-slate-500 mt-1">Admin Panel</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="mb-4 p-3 rounded-lg text-sm font-medium {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %} mr-2"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" required autofocus
                               class="login-input w-full pl-10 pr-4 py-3 border-2 border-slate-200 rounded-xl text-sm focus:outline-none transition-all"
                               placeholder="Enter your username">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" required
                               class="login-input w-full pl-10 pr-4 py-3 border-2 border-slate-200 rounded-xl text-sm focus:outline-none transition-all"
                               placeholder="Enter your password">
                    </div>
                </div>
                <button type="submit" class="login-btn w-full py-3 text-white font-semibold rounded-xl text-sm">
                    <i class="fas fa-right-to-bracket mr-2"></i> Sign In
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="{% url 'home' %}" class="text-sm text-slate-400 hover:text-slate-600 transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Website
                </a>
            </div>
        </div>
    </div>
</body>
</html>
