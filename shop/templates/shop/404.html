{% extends "shop/base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-20 text-center">
    <div class="text-8xl font-bold text-gray-200 mb-4">404</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Page Not Found</h1>
    <p class="text-gray-500 mb-8">The page you are looking for does not exist or has been moved.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="{% url 'home' %}" class="inline-flex items-center justify-center gap-2 bg-primary-600 hover:bg-primary-700 text-white px-8 py-3 rounded-xl font-bold transition-colors">
            <i class="fas fa-home"></i>
            Go to Homepage
        </a>
        <a href="{% url 'product_list' %}" class="inline-flex items-center justify-center gap-2 border-2 border-primary-600 text-primary-600 hover:bg-primary-50 px-8 py-3 rounded-xl font-bold transition-colors">
            <i class="fas fa-shopping-bag"></i>
            Browse Products
        </a>
    </div>
</div>
{% endblock %}
